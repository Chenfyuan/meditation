services:
  postgres:
    image: postgres:16-alpine
    container_name: meditation-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-meditation}
      POSTGRES_USER: ${POSTGRES_USER:-meditation}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meditation}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-meditation} -d ${POSTGRES_DB:-meditation}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
